<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PyMOL-RS — Minimal Viewer</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #000;
                height: 100vh;
            }
            #viewer {
                width: 100vw;
                height: 100vh;
            }
        </style>
    </head>
    <body>
        <div id="viewer"></div>

        <script type="module">
            import { PyMolRSViewer } from "../dist/pymol-rs-viewer.js";

            const viewer = new PyMolRSViewer(document.getElementById("viewer"));
            await viewer.init();

            await viewer.loadUrl("https://models.rcsb.org/1IGT.bcif.gz", {
                name: "1IGT",
                format: "bcif",
            });

            viewer.execute("bg_color white");
            viewer.execute("set shading_mode, skripkin");
            viewer.execute("set ambient, 0.8");
            viewer.execute("set silhouettes, on");
            viewer.execute("set silhouette_width, 1");
            viewer.execute("set silhouette_color, black");
        </script>
    </body>
</html>
