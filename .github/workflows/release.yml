name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.1.0)"
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build-executables:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x86_64
            ext: .exe
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-arm64
            ext: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: linux-arm64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libxrandr-dev \
            libxi-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-randr0-dev \
            libxcb-xfixes0-dev \
            libasound2-dev \
            libfontconfig1-dev

      - name: Build with cargo
        run: cargo build --release -p pymol-gui --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../pymol-rs-${{ matrix.name }}.tar.gz pymol-rs${{ matrix.ext }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../pymol-rs-${{ matrix.name }}.zip pymol-rs${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pymol-rs-${{ matrix.name }}
          path: pymol-rs-${{ matrix.name }}.*
          if-no-files-found: error

  build-plugins:
    name: Build plugins ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x86_64
            lib_glob: "*_plugin.dll"
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-arm64
            lib_glob: "lib*_plugin.dylib"
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
            lib_glob: "lib*_plugin.so"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: linux-arm64
            lib_glob: "lib*_plugin.so"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libxrandr-dev \
            libxi-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-randr0-dev \
            libxcb-xfixes0-dev \
            libasound2-dev \
            libfontconfig1-dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build plugins
        run: cargo build --release -p hello-plugin -p ipc-plugin -p python-plugin --target ${{ matrix.target }}
        env:
          PYO3_PYTHON: python3

      - name: Package plugins (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.lib_glob }} staging/
          cd staging
          tar -czvf ../pymol-rs-plugins-${{ matrix.name }}.tar.gz *

      - name: Package plugins (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir staging
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.lib_glob }}" staging/
          cd staging
          7z a ../pymol-rs-plugins-${{ matrix.name }}.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pymol-rs-plugins-${{ matrix.name }}
          path: pymol-rs-plugins-${{ matrix.name }}.*
          if-no-files-found: error

  build-wheels:
    name: Build wheel ${{ matrix.os }} ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-24.04-arm
            target: aarch64
            manylinux: auto

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          manylinux: ${{ matrix.manylinux || 'auto' }}
          working-directory: python

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: python/dist/*.whl
          if-no-files-found: error

  build-web:
    name: Build web libraries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build WASM + TypeScript bundle
        working-directory: web
        run: npm run build

      - name: Package web bundle
        run: |
          mkdir -p staging
          cp -r web/dist staging/
          cp -r web/pkg staging/
          cp web/package.json staging/
          cd staging
          tar -czvf ../pymol-rs-web.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pymol-rs-web
          path: pymol-rs-web.tar.gz
          if-no-files-found: error

  build-macos-app:
    name: Build macOS DMG bundle
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install maturin
        run: uv tool install maturin

      - name: Build full .dmg bundle
        run: make dmg-full

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: target/PyMOL-RS.dmg
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-executables, build-plugins, build-wheels, build-web, build-macos-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Move all archives (executables + plugins)
          find artifacts -type f -name 'pymol-rs-*.tar.gz' -exec mv {} release/ \;
          find artifacts -type f -name 'pymol-rs-*.zip' -exec mv {} release/ \;
          # Move wheels
          find artifacts -type f -name '*.whl' -exec mv {} release/ \;
          # Move DMG
          find artifacts -type f -name '*.dmg' -exec mv {} release/ \;
          ls -la release/

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: release/*
