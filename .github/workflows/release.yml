name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.1.0)"
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build-executables:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x86_64
            ext: .exe
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            name: windows-arm64
            ext: .exe
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-arm64
            ext: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: linux-arm64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Cache APT packages
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            libxkbcommon-dev libwayland-dev libxrandr-dev libxi-dev
            libx11-dev libx11-xcb-dev libxcb-randr0-dev libxcb-xfixes0-dev
            libasound2-dev libfontconfig1-dev libgtk-3-dev libxdo-dev
          version: 1.0

      - name: Build with cargo
        run: cargo build --release -p pymol-gui --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../pymol-rs-${{ matrix.name }}.tar.gz pymol-rs${{ matrix.ext }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../pymol-rs-${{ matrix.name }}.zip pymol-rs${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: pymol-rs-${{ matrix.name }}
          path: pymol-rs-${{ matrix.name }}.*
          if-no-files-found: error

  build-plugins:
    name: Build plugins ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x86_64
            lib_glob: "*_plugin.dll"
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            name: windows-arm64
            lib_glob: "*_plugin.dll"
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-arm64
            lib_glob: "lib*_plugin.dylib"
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
            lib_glob: "lib*_plugin.so"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: linux-arm64
            lib_glob: "lib*_plugin.so"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: plugins-${{ matrix.target }}

      - name: Cache APT packages
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            libxkbcommon-dev libwayland-dev libxrandr-dev libxi-dev
            libx11-dev libx11-xcb-dev libxcb-randr0-dev libxcb-xfixes0-dev
            libasound2-dev libfontconfig1-dev libgtk-3-dev libxdo-dev
          version: 1.0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build plugins
        run: >-
          cargo build --release --target ${{ matrix.target }}
          -p raytracer-plugin -p hello-plugin -p python-plugin
          ${{ runner.os != 'Windows' && '-p ipc-plugin' || '' }}
        env:
          PYO3_PYTHON: python3

      - name: Package plugins (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.lib_glob }} staging/
          cd staging
          tar -czvf ../pymol-rs-plugins-${{ matrix.name }}.tar.gz *

      - name: Package plugins (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir staging
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.lib_glob }}" staging/
          Copy-Item "plugins/*/*.deps" staging/ -ErrorAction SilentlyContinue
          cd staging
          7z a ../pymol-rs-plugins-${{ matrix.name }}.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: pymol-rs-plugins-${{ matrix.name }}
          path: pymol-rs-plugins-${{ matrix.name }}.*
          if-no-files-found: error

  build-wheels:
    name: Build wheel ${{ matrix.os }} ${{ matrix.target }}
    needs: [build-web]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64
          - os: windows-11-arm
            target: aarch64
          - os: macos-latest
            target: aarch64
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-24.04-arm
            target: aarch64
            manylinux: auto

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: wheels-${{ matrix.target }}
          workspaces: python

      - name: Download web build
        uses: actions/download-artifact@v8
        with:
          name: pymol-rs-web
          path: web-artifact

      - name: Prepare widget assets
        run: |
          tar -xzf web-artifact/pymol-rs-web.tar.gz -C web-artifact
          mkdir -p python/pymol_rs/widget/static
          cp web-artifact/dist/pymol-rs-viewer.js python/pymol_rs/widget/static/
          cp web-artifact/dist/pymol_web_bg.wasm python/pymol_rs/widget/static/
          cp web-artifact/dist/pymol_web-*.js python/pymol_rs/widget/static/pymol_web_glue.js

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          manylinux: ${{ matrix.manylinux || 'auto' }}
          working-directory: python

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: python/dist/*.whl
          if-no-files-found: error

  build-web:
    name: Build web libraries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32

      - name: Install wasm-pack
        uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall wasm-pack --no-confirm --force

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm install

      - name: Build WASM + TypeScript bundle
        working-directory: web
        run: npm run build

      - name: Package web bundle
        run: |
          mkdir -p staging
          cp -r web/dist staging/
          cp -r web/pkg staging/
          cp web/package.json staging/
          cd staging
          tar -czvf ../pymol-rs-web.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: pymol-rs-web
          path: pymol-rs-web.tar.gz
          if-no-files-found: error

  build-dmg:
    name: Build macOS DMG
    needs: [build-web]
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: dmg-aarch64-apple-darwin

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python 3.13 via uv
        run: uv python install 3.13

      - name: Configure Python for build
        run: echo "PYO3_PYTHON=$(uv python find 3.13)" >> $GITHUB_ENV

      - name: Install maturin
        run: uv tool install maturin

      - name: Download web build
        uses: actions/download-artifact@v8
        with:
          name: pymol-rs-web
          path: web-artifact

      - name: Prepare widget assets
        run: |
          tar -xzf web-artifact/pymol-rs-web.tar.gz -C web-artifact
          mkdir -p web/dist
          cp -r web-artifact/dist/* web/dist/

      - name: Import signing certificate
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "ci-keychain" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "ci-keychain" $KEYCHAIN_PATH
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "ci-keychain" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          rm -f $RUNNER_TEMP/cert.p12

      - name: Create .env for signing
        if: ${{ secrets.PYMOL_RS_APPLE_TEAMID != '' }}
        env:
          PYMOL_RS_APPLE_TEAMID: ${{ secrets.PYMOL_RS_APPLE_TEAMID }}
          PYMOL_RS_APPLE_EMAIL: ${{ secrets.PYMOL_RS_APPLE_EMAIL }}
          PYMOL_RS_APPLE_APP_PASS: ${{ secrets.PYMOL_RS_APPLE_APP_PASS }}
        run: |
          printf 'PYMOL_RS_APPLE_TEAMID=%s\nPYMOL_RS_APPLE_EMAIL=%s\nPYMOL_RS_APPLE_APP_PASS=%s\n' \
            "$PYMOL_RS_APPLE_TEAMID" "$PYMOL_RS_APPLE_EMAIL" "$PYMOL_RS_APPLE_APP_PASS" > .env

      - name: Build DMG
        run: make dmg-full

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: pymol-rs-dmg-macos-arm64
          path: target/PyMOL-RS.dmg
          if-no-files-found: error

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true

  build-bundle-windows:
    name: Build Windows bundle ${{ matrix.name }}
    needs: [build-web]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x86_64
          - os: windows-11-arm
            name: windows-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install make
        run: choco install make -y

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: bundle-${{ matrix.name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python 3.13 via uv
        run: uv python install 3.13

      - name: Configure Python for build
        run: |
          $py = uv python find 3.13
          echo "PYO3_PYTHON=$py" >> $env:GITHUB_ENV

      - name: Install maturin
        run: uv tool install maturin

      - name: Download web build
        uses: actions/download-artifact@v8
        with:
          name: pymol-rs-web
          path: web-artifact

      - name: Prepare widget assets
        run: |
          tar -xzf web-artifact/pymol-rs-web.tar.gz -C web-artifact
          New-Item -ItemType Directory -Force -Path web/dist
          Copy-Item web-artifact/dist/* web/dist/ -Recurse

      - name: Build bundle
        run: make bundle-windows

      - name: Package bundle
        run: |
          cd target/bundle
          7z a ../../pymol-rs-bundle-${{ matrix.name }}.zip PyMOL-RS

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: pymol-rs-bundle-${{ matrix.name }}
          path: pymol-rs-bundle-${{ matrix.name }}.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-executables, build-plugins, build-wheels, build-web, build-dmg, build-bundle-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Move all archives (executables + plugins)
          find artifacts -type f -name 'pymol-rs-*.tar.gz' -exec mv {} release/ \;
          find artifacts -type f -name 'pymol-rs-*.zip' -exec mv {} release/ \;
          # Move DMG
          find artifacts -type f -name '*.dmg' -exec mv {} release/ \;
          # Move wheels
          find artifacts -type f -name '*.whl' -exec mv {} release/ \;
          ls -la release/

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: release/*
