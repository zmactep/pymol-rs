name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            libxkbcommon-dev libwayland-dev libxrandr-dev libxi-dev
            libx11-dev libx11-xcb-dev libxcb-randr0-dev libxcb-xfixes0-dev
            libasound2-dev libfontconfig1-dev libgtk-3-dev libxdo-dev
          version: 1.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: cargo build --verbose
        env:
          PYO3_PYTHON: python3

      - name: Run tests
        run: cargo test --verbose
        env:
          PYO3_PYTHON: python3

      - name: Install Rust wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build widget assets
        run: |
          cd web && npm install && npm run build && cd ..
          mkdir -p python/pymol_rs/widget/static
          cp web/dist/pymol-rs-viewer.js python/pymol_rs/widget/static/
          cp web/dist/pymol_web_bg.wasm python/pymol_rs/widget/static/
          cp web/dist/pymol_web-*.js python/pymol_rs/widget/static/pymol_web_glue.js

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist --find-interpreter
          manylinux: auto
          working-directory: python
