name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            libxkbcommon-dev libwayland-dev libxrandr-dev libxi-dev
            libx11-dev libx11-xcb-dev libxcb-randr0-dev libxcb-xfixes0-dev
            libasound2-dev libfontconfig1-dev libgtk-3-dev libxdo-dev
          version: 1.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        env:
          PYO3_PYTHON: python3

      - name: Check workspace
        run: cargo check --workspace
        env:
          PYO3_PYTHON: python3

      - name: Run workspace tests
        run: cargo test --workspace --verbose
        env:
          PYO3_PYTHON: python3

      - name: Check Python crate
        run: cargo check --manifest-path python/Cargo.toml
        env:
          PYO3_PYTHON: python3

      - name: Install Rust wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Check web WASM crate
        run: cargo check --manifest-path web/Cargo.toml --target wasm32-unknown-unknown

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build widget assets
        run: |
          cd web && npm ci && npm run build && cd ..
          make widget-assets

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist --find-interpreter
          manylinux: auto
          working-directory: python
