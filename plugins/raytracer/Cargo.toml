[package]
name = "raytracer-plugin"
description = "GPU raytracing plugin for Patinae"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Plugin SDK
patinae-plugin = { workspace = true }

# Scene types and displayed-geometry export bridge
patinae-scene = { workspace = true, default-features = false, features = ["render-bridge"] }

# Renderer-neutral displayed geometry
patinae-render = { workspace = true }

# Molecular data (ObjectMolecule, CoordSet, Atom)
patinae-mol = { workspace = true }

# Colors
patinae-color = { workspace = true }

# Settings (for reading shading/sphere/stick settings)
patinae-settings = { workspace = true }

# GPU
wgpu = { workspace = true }
pollster = "0.4"

# Math
lin_alg = { workspace = true }

# GPU data
bytemuck = { workspace = true }

# Image export
image = { workspace = true }

# Logging
log = { workspace = true }

# Error handling
thiserror = { workspace = true }

[dev-dependencies]
naga = { version = "28", features = ["wgsl-in"] }

[lints]
workspace = true
