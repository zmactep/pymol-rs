[package]
name = "ipc-plugin"
version = "0.1.0"
edition = "2021"
description = "PyMOL-RS IPC server plugin: Unix domain socket control"

[lib]
crate-type = ["cdylib"]

[dependencies]
pymol-plugin = { path = "../../crates/pymol-plugin" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
