[package]
name = "ipc-plugin"
version = "0.2.2"
edition = "2021"
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "PyMOL-RS IPC server plugin: Unix domain socket control"

[lib]
crate-type = ["cdylib"]

[dependencies]
pymol-plugin = { path = "../../crates/pymol-plugin" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
