[package]
name = "python-plugin"
edition = "2021"
version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Patinae Python interpreter plugin: embedded Python scripting"

[lib]
crate-type = ["cdylib"]

[dependencies]
patinae-plugin = { path = "../../crates/patinae-plugin" }
patinae-mol = { path = "../../crates/patinae-mol" }
patinae-scene = { path = "../../crates/patinae-scene" }
patinae-select = { path = "../../crates/patinae-select" }
pyo3 = { version = "0.27.2", features = ["auto-initialize"] }
numpy = "0.27.1"
log = "0.4"
tree-sitter-highlight = "0.25"
tree-sitter-python = "0.25"

[lints]
workspace = true
