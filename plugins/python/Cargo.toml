[package]
name = "python-plugin"
version = "0.2.3"
edition = "2021"
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "PyMOL-RS Python interpreter plugin: embedded Python scripting"

[lib]
crate-type = ["cdylib"]

[dependencies]
pymol-plugin = { path = "../../crates/pymol-plugin" }
pymol-mol = { path = "../../crates/pymol-mol" }
pymol-select = { path = "../../crates/pymol-select" }
pyo3 = { version = "0.27.2", features = ["auto-initialize"] }
numpy = "0.27.1"
log = "0.4"
syntect = { version = "5", default-features = false, features = ["default-fancy"] }
egui = "0.33"
